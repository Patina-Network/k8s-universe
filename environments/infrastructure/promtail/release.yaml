# TODO: replace promtail with another log ingester, like fluentbit
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
  namespace: infrastructure
spec:
  interval: 1h
  releaseName: promtail
  chart:
    spec:
      chart: promtail
      version: "6.17.1"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: promtail-config
      valuesKey: config.yaml
  values: {}
