apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crossplane-github
  namespace: flux-system
spec:
  interval: 5m
  path: ./environments/infrastructure/crossplane/github
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
