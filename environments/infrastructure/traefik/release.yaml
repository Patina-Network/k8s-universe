apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: traefik
  install:
    createNamespace: true
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: traefik
      version: "39.0.7"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 12h
  values:
    additionalArguments:
      - --certificatesresolvers.letsencrypt.acme.email=tech@patinanetwork.org
      # todo: make more permanent
      - --certificatesresolvers.letsencrypt.acme.storage=/data/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    deployment:
      replicas: 1
    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik
    providers:
      kubernetesIngress:
        enabled: true
      kubernetesCRD:
        enabled: true
    ports:
      web:
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              priority: 10
      websecure:
        http:
          tls:
            enabled: true
    service:
      annotations:
        service.beta.kubernetes.io/azure-load-balancer-resource-group: MC_PatinaTesting_k8s-universe_eastus
        service.beta.kubernetes.io/azure-pip-name: traefik-public-ip
      type: LoadBalancer
