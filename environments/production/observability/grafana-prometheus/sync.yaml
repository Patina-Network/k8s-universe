apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-prometheus-production
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: flux-system
  path: ./base/production/observability/grafana-prometheus
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: production
  decryption:
    provider: sops
