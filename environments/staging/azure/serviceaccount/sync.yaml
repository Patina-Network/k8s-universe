apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: azure-serviceaccount-staging
  namespace: flux-system
spec:
  interval: 10m
  path: ./base/staging/azure/serviceaccount
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: staging
