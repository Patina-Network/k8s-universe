apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: codebloom-web
  namespace: staging
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`stg.codebloom.patinanetwork.org`) && PathPrefix(`/`)
      kind: Rule
      middlewares:
        - name: redirect-to-https
      services:
        - name: codebloom
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: codebloom-websecure
  namespace: staging
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`stg.codebloom.patinanetwork.org`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: codebloom
          port: 80
  tls:
    secretName: staging-codebloom-tls
