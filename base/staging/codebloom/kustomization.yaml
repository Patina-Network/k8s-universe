apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - certificate.yaml
  - deployment.yaml
  - ingress.yaml
  - secrets.yaml
  - service.yaml
  - monitor.yaml
configMapGenerator:
  - name: codebloom-spring-config
    files:
      - application-stg.yaml
commonLabels:
  app: codebloom
  environment: staging
images:
  - name: tahminator/codebloom
    newTag: staging-c329020 # update me to change version

replacements:
  - source:
      kind: Deployment
      name: codebloom
      fieldPath: spec.template.spec.containers.[name=codebloom].image
      options:
        delimiter: ":"
        index: 1
    targets:
      - select:
          kind: Deployment
          name: codebloom
        fieldPaths:
          - spec.template.spec.containers.[name=codebloom].env.[name=VERSION].value
          - spec.template.metadata.labels.version
