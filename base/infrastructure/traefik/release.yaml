apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: infrastructure
spec:
  interval: 30m
  install:
    createNamespace: true
    crds: Create
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: traefik
      version: "39.0.7"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 12h
  values:
    additionalArguments:
      - --certificatesresolvers.letsencrypt.acme.email=tech@patinanetwork.org
      - --certificatesresolvers.letsencrypt.acme.storage=/data/acme.json
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --metrics.prometheus=true
      - --accesslog=true
      - --accesslog.format=json
      - --accesslog.fields.names.ClientUsername=drop
      - --accesslog.fields.headers.defaultmode=keep
    persistence:
      enabled: true
      name: traefik-data
      accessMode: ReadWriteOnce
      size: 1Gi
      path: /data
      storageClass: default
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      fsGroup: 65532
      fsGroupChangePolicy: OnRootMismatch
    deployment:
      replicas: 1
    ingressClass:
      enabled: true
      isDefaultClass: false
      name: traefik
    providers:
      kubernetesIngress:
        enabled: true
      kubernetesCRD:
        enabled: true
    ports:
      web: {}
      websecure:
        http:
          tls:
            enabled: true
      postgres:
        port: 5432
        expose:
          default: true
        exposedPort: 5432
        protocol: TCP
    service:
      annotations:
        # az aks show --resource-group PatinaTestingK8s --name k8s-manifests --query nodeResourceGroup -o tsv
        service.beta.kubernetes.io/azure-load-balancer-resource-group: MC_PatinaTestingK8s_k8s-manifests_eastus
        # az network public-ip show --resource-group MC_PatinaTestingK8s_k8s-manifests_eastus --name traefik-public-ip --query ipAddress -o tsv
        # this is managed by `platform-infra`
        service.beta.kubernetes.io/azure-pip-name: traefik-public-ip
      type: LoadBalancer
