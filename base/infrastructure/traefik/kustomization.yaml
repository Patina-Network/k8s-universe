apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - monitor.yaml
configMapGenerator:
  - name: traefik-config
    files:
      - config.yaml
    options:
      labels:
        reconcile.fluxcd.io/watch: "Enabled"
generatorOptions:
  disableNameSuffixHash: true
