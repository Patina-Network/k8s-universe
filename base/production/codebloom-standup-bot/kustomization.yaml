apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - secrets.yaml
commonLabels:
  app: codebloom-standup-bot
  environment: production
images:
  - name: tahminator/codebloom-standup-bot
    newTag: 0ae1d8e # update me to change version

replacements:
  - source:
      kind: Deployment
      name: codebloom-standup-bot
      fieldPath: spec.template.spec.containers.[name=codebloom-standup-bot].image
      options:
        delimiter: ":"
        index: 1
    targets:
      - select:
          kind: Deployment
          name: codebloom-standup-bot
        fieldPaths:
          - spec.template.spec.containers.[name=codebloom-standup-bot].env.[name=VERSION].value
          - spec.template.metadata.labels.version
