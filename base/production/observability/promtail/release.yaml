# TODO: replace promtail with another log ingester, like fluentbit
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
  namespace: production
spec:
  interval: 1h
  releaseName: promtail
  targetNamespace: production
  chart:
    spec:
      chart: promtail
      version: "6.17.1"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  # https://github.com/grafana/helm-charts/blob/main/charts/promtail/values.yaml
  values:
    config:
      clients:
        - url: http://loki.production.svc.cluster.local:3100/loki/api/v1/push
    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 128Mi
