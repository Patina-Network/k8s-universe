apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: codebloom
  namespace: production
spec:
  selector:
    matchLabels:
      app: codebloom
  endpoints:
    - port: http-web
      path: /actuator/prometheus
      interval: 30s
      basicAuth:
        username:
          name: codebloom-production-secrets
          key: ACTUATOR_USERNAME
        password:
          name: codebloom-production-secrets
          key: ACTUATOR_PASSWORD
