apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: production
spec:
  interval: 1h
  releaseName: kube-prometheus-stack
  targetNamespace: production
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "83.4.2"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  # https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
  values:
    grafana:
      enabled: true
      admin:
        existingSecret: grafana-secrets
        userKey: ADMIN_USER
        passwordKey: ADMIN_PASSWORD
      additionalDataSources:
        - name: Loki
          type: loki
          url: http://loki.production.svc.cluster.local:3100
          access: proxy
          isDefault: false
          jsonData:
            maxLines: 1000
      operator:
        folder: K8S
      grafana.ini:
        server:
          root_url: https://grafana.patinanetwork.org
        database:
          type: postgres
          host: postgres.production.svc.cluster.local:5432
          name: grafana
          user: $__env{DB_USER}
          password: $__env{DB_PASSWORD}
        # smtp:
        #   enabled: true
        #   host: $__env{SMTP_HOST}
        #   user: $__env{SMTP_USER}
        #   password: $__env{SMTP_PASSWORD}
        #   from_address: $__env{SMTP_USER}
        #   from_name: Grafana (k8s-personal)
      envFromSecrets:
        - name: grafana-secrets
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard
          labelValue: "1"
          searchNamespace: ALL
          defaultFolderName: "K8S"
    prometheus:
      enabled: true
      prometheusSpec:
        retention: 14d
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorNamespaceSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        scrapeConfigNamespaceSelectorNilUsesHelmValues: false
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: prometheus
              accessModes:
                - "ReadWriteOnce"
              resources:
                requests:
                  storage: 5Gi
    nodeExporter:
      enabled: true
    kubeStateMetrics:
      enabled: true
